name: checkout

on:
    push: 
        branches:
          - feature/*

jobs:
    Build:
      runs-on: ubuntu-22.04
      steps:
        - name: Checkout
          uses: actions/checkout@v7

        - name: Setup to Java 21
          uses: actions/setup-java@v5
          with:
            distribution: 'corretto'
            java-version: '21'
        
        - run: java --version

        - name: Build with Maven
          run: mvn clean install

    Test:
      runs-on: ubuntu-22.04
      steps:
        - uses: actions/checkout@v7
        - uses: actions/setup-java@v5
          with:
            distribution: 'corretto'
            java-version: '21'

        - name: Tests with Maven
          run: java --version
        - run: mvn test

        

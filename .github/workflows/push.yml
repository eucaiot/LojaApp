name: checkout

on:
    push: 
        branches:
          - feature/*

jobs:
    build-and-test:
      runs-on: ubuntu-22.04
      steps:
        - name: Checkout
          uses: actions/checkout@v7

        - name: Setup to Java 21
          uses: actions/setup-java@v5
          with:
            distribution: 'corretto'
            java-version: '21'
        
        - run: java --version
        - run: echo "Setup para Java 21 concluido"

        - name: Build with Maven
          run: echo "Iniciando build"
          
        - run: mvn clean install
          
        -  run: echo "Build Concluido"
    
        - run: echo "Iniciando testes"
        - name: Tests
          run: mvn test
        - run: echo "Build Concluido"

        

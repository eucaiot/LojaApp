name: Pull Request
on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        java-version: ['21', '25']

    steps:
      - name: Build
        uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: ${{ matrix.java-version }}

      - run: java --version

      - run: mvn clean install
